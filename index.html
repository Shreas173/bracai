    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

    /* ===== Intersection Observer hook for fade-in ===== */
    function useFadeIn() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { entry.target.classList.add('visible'); obs.unobserve(entry.target); } },
          { threshold: 0.15 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    /* ===== Game of Life ===== */
    function useGameOfLife(canvasRef, { interval = 2800, fill = 0.18 } = {}) {
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        const parent = canvas.parentElement;
        let grid = []; let lastTick = 0; let w = 0; let h = 0; let animId;
        let cols = 0, rows = 0; let beat = 0; const BEAT = 800;

        function reseed(newCols, newRows) {
          const g = [];
          for (let r = 0; r < newRows; r++) {
            g[r] = [];
            for (let c = 0; c < newCols; c++)
              g[r][c] = (grid && grid[r % grid.length] && grid[r % grid.length][c % grid[0].length]) || (Math.random() < fill ? 1 : 0);
          }
          return g;
        }

        function nextGen(g, c, r) {
          const ng = g.map(row => [...row]);
          for (let r2 = 0; r2 < r; r2++)
            for (let c2 = 0; c2 < c; c2++) {
              let n = 0;
              for (let dr = -1; dr <= 1; dr++)
                for (let dc = -1; dc <= 1; dc++) {
                  if (dr === 0 && dc === 0) continue;
                  n += g[(r2 + dr + r) % r][(c2 + dc + c) % c];
                }
              ng[r2][c2] = g[r2][c2] === 1 ? (n < 2 || n > 3 ? 0 : 1) : (n === 3 ? 1 : 0);
            }
          return ng;
        }

        const CSZ = 40;

        function draw() {
          if (w <= 0 || h <= 0) return;
          ctx.clearRect(0, 0, w, h);
          for (let r = 0; r < rows; r++)
            for (let c = 0; c < cols; c++)
              if (grid[r][c]) {
                ctx.fillStyle = beat === 0 ? 'oklch(68% 0.12 248 / 0.22)' : 'oklch(72% 0.08 240 / 0.14)';
                ctx.fillRect(c * CSZ, r * CSZ, CSZ, CSZ);
              }
        }

        function resize() {
          const rect = parent.getBoundingClientRect();
          const nw = Math.round(rect.width);
          const nh = Math.round(rect.height);
          if (nw <= 0 || nh <= 0) return;
          const dpr = window.devicePixelRatio || 1;
          canvas.width = nw * dpr;
          canvas.height = nh * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          canvas.style.width = nw + 'px';
          canvas.style.height = nh + 'px';
          if (nw === w && nh === h) return;
          w = nw; h = nh;
          const nc = Math.max(20, Math.floor(w / CSZ));
          const nr = Math.max(6, Math.floor(h / CSZ));
          if (nc !== cols || nr !== rows) {
            grid = reseed(nc, nr);
            cols = nc; rows = nr;
          }
        }

        function init() {
          const rect = parent.getBoundingClientRect();
          w = Math.round(rect.width); h = Math.round(rect.height);
          cols = Math.max(20, Math.floor(w / CSZ));
          rows = Math.max(6, Math.floor(h / CSZ));
          grid = reseed(cols, rows);
          resize();
        }

        init();

        const ro = new ResizeObserver(() => { resize(); draw(); });
        ro.observe(parent);

        function loop(now) {
          draw();
          if (now - lastTick >= BEAT) {
            grid = nextGen(grid, cols, rows);
            beat = (beat + 1) % 4;
            draw();
            lastTick = now;
          }
          animId = requestAnimationFrame(loop);
        }

        animId = requestAnimationFrame(loop);
        return () => { cancelAnimationFrame(animId); ro.disconnect(); };
      }, [canvasRef, interval, fill]);
    }

    /* ===== Three.js Hero ===== */
    function ThreeHero() {
      const ref = useRef(null);
      useEffect(() => {
        if (typeof THREE === 'undefined') return;
        const el = ref.current;
        if (!el || el.clientWidth <= 0) return;
        const w = el.clientWidth, h = el.clientHeight;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
        camera.position.z = 6;
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        el.appendChild(renderer.domElement);
        const pc = 80; const pp = new Float32Array(pc * 3);
        for (let i = 0; i < pc * 3; i++) pp[i] = (Math.random() - 0.5) * 14;
        const pg = new THREE.BufferGeometry(); pg.setAttribute('position', new THREE.BufferAttribute(pp, 3));
        const colors = new Float32Array(pc * 3);
        for (let i = 0; i < pc; i++) {
          const c = Math.random() > 0.4 ? [0.22, 0.42, 0.96] : [0.88, 0, 0.55];
          colors[i*3] = c[0]; colors[i*3+1] = c[1]; colors[i*3+2] = c[2];
        }
        pg.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const pm = new THREE.PointsMaterial({ size: 0.015, transparent: true, opacity: 0.045, vertexColors: true, depthWrite: false, blending: THREE.AdditiveBlending });
        const pts = new THREE.Points(pg, pm);
        scene.add(pts);
        let id; let t = 0;
        function tick() {
          id = requestAnimationFrame(tick);
          t += 0.003;
          pts.rotation.y = Math.sin(t * 0.15) * 0.04;
          pts.rotation.x = Math.sin(t * 0.1) * 0.02;
          renderer.render(scene, camera);
        }
        tick();
        const ro = new ResizeObserver(() => { const nw = el.clientWidth, nh = el.clientHeight; if (nw > 0) { camera.aspect = nw / nh; camera.updateProjectionMatrix(); renderer.setSize(nw, nh); } });
        ro.observe(el);
        return () => { cancelAnimationFrame(id); renderer.dispose(); pg.dispose(); pm.dispose(); ro.disconnect(); };
      }, []);
      return <div ref={ref} style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0, overflow: 'hidden' }} />;
    }

    }

              <circle cx={x} cy={80 + i * 10} r={2} fill={i % 2 === 0 ? '#EC008C' : 'oklch(55% 0.16 250)'} opacity={0.04} />

    /* ===== Hero ===== */
    function Hero() {
      const canvasRef = useRef(null);
      useGameOfLife(canvasRef, { interval: 3000, fill: 0.15 });
      const fadeRef = useFadeIn();

      return (

    /* ===== Initial Cohort ===== */
    const projects = [
      { title: 'Crop Health Classifier', status: 'Active', progress: 65 },

      { title: 'Bengali NLP Pipeline', status: 'Active', progress: 78 },
